<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Template Namespace Test</title>
        <style>
            body {
                font-family: sans-serif;
                padding: 16px;
            }
            section {
                margin-bottom: 20px;
            }
            .box {
                border: 1px solid #999;
                padding: 8px;
                margin-top: 8px;
            }
            svg {
                border: 1px dashed #999;
                width: 160px;
                height: 80px;
            }
            math {
                font-size: 28px;
            }
            pre {
                background: #f5f5f5;
                padding: 8px;
                white-space: pre-wrap;
            }
        </style>
    </head>
    <body>
        <h1>Template namespace behavior</h1>

        <template id="tpl-raw-svg">
            <circle cx="40" cy="40" r="30" fill="tomato"></circle>
        </template>

        <template id="tpl-wrapped-svg">
            <svg viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="30" fill="seagreen"></circle>
            </svg>
        </template>

        <template id="tpl-raw-math"> <mi>x</mi><mo>+</mo><mn>1</mn> </template>

        <template id="tpl-wrapped-math">
            <math><mi>y</mi><mo>=</mo><mn>2</mn></math>
        </template>

        <section>
            <h2>SVG host</h2>
            <svg id="svg-host" viewBox="0 0 80 80"></svg>
            <div id="svg-log" class="box"></div>
        </section>

        <section>
            <h2>Math host</h2>
            <math id="math-host"></math>
            <div id="math-log" class="box"></div>
        </section>

        <section>
            <h2>Console dump</h2>
            <pre id="dump"></pre>
        </section>

        <script>
            const XHTML = 'http://www.w3.org/1999/xhtml'
            const SVG = 'http://www.w3.org/2000/svg'
            const MATH = 'http://www.w3.org/1998/Math/MathML'

            const svgHost = document.getElementById('svg-host')
            const mathHost = document.getElementById('math-host')
            const svgLog = document.getElementById('svg-log')
            const mathLog = document.getElementById('math-log')
            const dump = document.getElementById('dump')

            const templateTagRawSvg = document.getElementById('tpl-raw-svg')
            const tplWrappedSvg = document.getElementById('tpl-wrapped-svg')
            const tplRawMath = document.getElementById('tpl-raw-math')
            const tplWrappedMath = document.getElementById('tpl-wrapped-math')

            const lines = []
            const log = (msg) => {
                lines.push(msg)
                console.log(msg)
            }

            function firstEl(node) {
                const walker = document.createTreeWalker(node, NodeFilter.SHOW_ELEMENT)
                return walker.nextNode()
            }

            function nsLabel(ns) {
                if (ns === XHTML) return 'xhtml'
                if (ns === SVG) return 'svg'
                if (ns === MATH) return 'mathml'
                return String(ns)
            }

            // A) Clone template content directly and append into SVG host.
            const fragmentA = templateTagRawSvg.content.cloneNode(true)
            const aEl = firstEl(fragmentA)
            svgHost.append(fragmentA)
            log('A raw-svg first element ns=' + nsLabel(aEl?.namespaceURI) + ' local=' + aEl?.localName)

            // B) Clone wrapped svg template and append.
            const templateTagWrappedSvg = document.getElementById('tpl-wrapped-svg')
            const fragmentB = templateTagWrappedSvg.content.cloneNode(true)
            const bEl = firstEl(fragmentB)
            svgHost.append(fragmentB)
            log('B wrapped-svg first element ns=' + nsLabel(bEl?.namespaceURI) + ' local=' + bEl?.localName)

            // C) Clone raw math template into math host.
            const templateTagRawMath = document.getElementById('tpl-raw-math')
            const fragmentC = templateTagRawMath.content.cloneNode(true)
            const cEl = firstEl(fragmentC)
            mathHost.append(fragmentC)
            log('C raw-math first element ns=' + nsLabel(cEl?.namespaceURI) + ' local=' + cEl?.localName)

            // D) Clone wrapped math template into math host.
            const templateTagWrappedMath = document.getElementById('tpl-wrapped-math')
            const fragmentD = templateTagWrappedMath.content.cloneNode(true)
            const dEl = firstEl(fragmentD)
            mathHost.append(fragmentD)
            log('D wrapped-math first element ns=' + nsLabel(dEl?.namespaceURI) + ' local=' + dEl?.localName)

            // E) Reparse raw SVG markup in SVG context via createContextualFragment.
            const r1 = document.createRange()
            r1.selectNodeContents(svgHost)
            const fragmentE = r1.createContextualFragment(templateTagRawSvg.innerHTML)
            const eEl = firstEl(fragmentE)
            svgHost.append(fragmentE)
            log('E reparsed raw-svg in svg context ns=' + nsLabel(eEl?.namespaceURI) + ' local=' + eEl?.localName)

            // F) Reparse raw MathML markup in Math context via createContextualFragment.
            const r2 = document.createRange()
            r2.selectNodeContents(mathHost)
            const fragmentF = r2.createContextualFragment(templateTagRawMath.innerHTML)
            const fEl = firstEl(fragmentF)
            mathHost.append(fragmentF)
            log('F reparsed raw-math in math context ns=' + nsLabel(fEl?.namespaceURI) + ' local=' + fEl?.localName)

            svgLog.textContent = 'Look for rendered green circle from B and rendered tomato circle from E.'
            mathLog.textContent = 'Look for math rendering from D and F.'
            dump.textContent = lines.join('\n')
        </script>
    </body>
</html>
